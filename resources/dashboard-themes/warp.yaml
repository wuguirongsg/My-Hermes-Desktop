  secondary: "#3f3a36"
  secondaryForeground: "#c9c0ad"
  muted: "#302c28"
  mutedForeground: "#aea69c"
  accent: "#403c38"
  accentForeground: "#f7f5f0"
  destructive: "#c64545"
  destructiveForeground: "#f7f5f0"
